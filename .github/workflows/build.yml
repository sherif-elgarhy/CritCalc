name: Build Android AAB + APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Capacitor copy
        run: npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB + APK
        run: |
          cd android
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Sign AAB
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          jarsigner -verbose \
            -storetype JKS \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"
          rm keystore.jks

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          jarsigner -verbose \
            -storetype JKS \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.KEY_ALIAS }}"
          rm keystore.jks

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: critcalc-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 30

      - name: Upload APK (direct install)
        uses: actions/upload-artifact@v4
        with:
          name: critcalc-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
